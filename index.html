<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復健科專科口試模擬</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e0f;
    --bg-elev: #16181a;
    --bg-card: #1c1f22;
    --border: #2a2e33;
    --border-strong: #3a3f45;
    --text: #e8e6e1;
    --text-dim: #9ca0a6;
    --text-faint: #5a5e64;
    --accent: #d4a548;
    --accent-dim: #8a6a2c;
    --warn: #e07a5f;
    --danger: #c8553d;
    --serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
    --tc: 'Noto Serif TC', serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--tc);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.7;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 10%, rgba(212, 165, 72, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(212, 165, 72, 0.03) 0%, transparent 40%);
  }

  #root { min-height: 100vh; }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  .landing-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 48px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .landing-title {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 12px;
  }
  .landing-title .tc {
    font-family: var(--tc);
    font-weight: 500;
    letter-spacing: 0;
  }
  .landing-sub {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 560px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .domain-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 56px;
  }
  .domain-cell {
    background: var(--bg);
    padding: 28px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    border: none;
    color: var(--text);
    font-family: var(--tc);
    position: relative;
  }
  .domain-cell:hover:not(:disabled) { background: var(--bg-elev); }
  .domain-cell.active { background: rgba(212, 165, 72, 0.08); }
  .domain-cell.active::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .domain-cell:disabled { opacity: 0.35; cursor: not-allowed; }
  .domain-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
  }
  .domain-name-en {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 4px;
  }
  .domain-name-tc {
    font-family: var(--tc);
    font-size: 18px;
    font-weight: 500;
  }
  .domain-cell.active .domain-name-tc { color: var(--accent); }
  .domain-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    margin-top: 12px;
  }

  .config-group { margin-bottom: 40px; }
  .config-label {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .count-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .count-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 18px 10px;
    font-family: var(--tc);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .count-btn:hover:not(:disabled) {
    border-color: var(--border-strong);
    background: var(--bg-elev);
  }
  .count-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(212, 165, 72, 0.06);
  }
  .count-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .count-btn-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .count-btn.active .count-btn-label {
    color: var(--accent);
  }
  .count-btn-num {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .info-cell {
    background: var(--bg);
    padding: 18px 22px;
  }
  .info-cell-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-cell-value {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--text);
  }

  .start-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 22px;
    font-family: var(--tc);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .start-btn:hover:not(:disabled) {
    background: #e0b25a;
    transform: translateY(-1px);
  }
  .start-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
    cursor: not-allowed;
    transform: none;
  }

  .case-screen {
    min-height: 100vh;
    padding: 48px 32px;
    max-width: 880px;
    margin: 0 auto;
  }
  .case-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 36px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .case-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 500;
  }
  .case-progress {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .case-body {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 36px 40px;
    margin-bottom: 32px;
    line-height: 1.85;
    font-size: 15.5px;
    white-space: pre-wrap;
  }
  .ready-note {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    text-align: center;
    margin: 24px 0;
  }

  .question-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 32px;
    max-width: 920px;
    margin: 0 auto;
  }
  .q-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .q-marker {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .q-marker .accent { color: var(--accent); }
  .timer {
    font-family: var(--mono);
    font-size: 44px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: font-size 0.3s ease, color 0.3s ease;
  }
  .timer.warning { color: var(--warn); }
  .timer.danger {
    color: var(--danger);
    font-size: 64px;
    font-weight: 700;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
  }
  .progress-fill.warning { background: var(--warn); }
  .progress-fill.danger { background: var(--danger); }

  .subq-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 36px;
    justify-content: center;
  }
  .subq-dot {
    width: 28px;
    height: 4px;
    background: var(--border);
    transition: background 0.2s ease;
  }
  .subq-dot.done { background: var(--accent-dim); }
  .subq-dot.current { background: var(--accent); }

  .q-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 0;
    min-height: 320px;
  }
  .q-text {
    font-family: var(--tc);
    font-size: 26px;
    line-height: 1.55;
    font-weight: 400;
    text-align: left;
    max-width: 760px;
    color: var(--text);
  }

  .q-controls {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .q-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
  }
  .q-btns {
    display: flex;
    gap: 10px;
  }
  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }
  .ctrl-btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-btn.primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .timeup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 14, 15, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(8px);
    padding: 32px;
  }
  .timeup-mark {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--danger);
    margin-bottom: 16px;
  }
  .timeup-title {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .timeup-sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 40px;
  }

  .results-screen {
    padding: 48px 32px;
    max-width: 920px;
    margin: 0 auto;
  }
  .results-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 48px;
  }
  .results-title {
    font-family: var(--serif);
    font-size: 44px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .results-sub {
    color: var(--text-dim);
    font-size: 15px;
  }

  .case-block { margin-bottom: 64px; }
  .case-block-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .case-block-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.2em;
  }
  .case-block-title {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    flex: 1;
  }
  .case-domain-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 4px 10px;
  }
  .case-context {
    background: var(--bg-card);
    border-left: 2px solid var(--accent-dim);
    padding: 22px 28px;
    margin-bottom: 28px;
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text-dim);
    white-space: pre-wrap;
  }

  .qa-block {
    margin-bottom: 24px;
    padding-bottom: 0;
    border-bottom: none;
  }
  .qa-block:last-child { border-bottom: none; }

  /* Collapsible question block */
  .qa-card {
    border: 1px solid var(--border);
    background: var(--bg-card);
    transition: border-color 0.15s ease;
  }
  .qa-card.open {
    border-color: var(--border-strong);
  }
  .qa-summary {
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
    transition: background 0.15s ease;
  }
  .qa-summary:hover {
    background: var(--bg-elev);
  }
  .qa-chevron {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .qa-card.open .qa-chevron {
    transform: rotate(90deg);
    color: var(--accent);
  }
  .qa-q-summary {
    font-family: var(--tc);
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
  }
  .qa-q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    flex-shrink: 0;
  }
  .qa-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    white-space: nowrap;
    border: 1px solid var(--border);
    padding: 4px 10px;
    flex-shrink: 0;
  }
  .qa-time.timeout { color: var(--danger); border-color: var(--danger); }
  .qa-time.unanswered { color: var(--text-faint); opacity: 0.5; }

  .qa-expanded {
    border-top: 1px solid var(--border);
    padding: 4px 0;
  }

  /* Section: keywords */
  .det-section {
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
  }
  .det-section:last-child { border-bottom: none; }
  .det-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .det-section-label::before {
    content: '◆';
    font-size: 8px;
  }

  .keyword-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .keyword-tag {
    background: rgba(212, 165, 72, 0.08);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    padding: 5px 11px;
    font-family: var(--tc);
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .keyword-tag.en {
    font-family: var(--mono);
    font-size: 12px;
  }

  .points-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .points-list li {
    padding: 6px 0 6px 22px;
    position: relative;
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--text);
  }
  .points-list li::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 14px;
    width: 6px;
    height: 1px;
    background: var(--accent);
  }
  .points-list li strong {
    color: var(--accent);
    font-weight: 500;
  }

  .det-content {
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text);
  }
  .det-content strong {
    color: var(--accent);
    font-weight: 500;
  }
  .det-content ul, .det-content ol {
    margin: 8px 0 12px 20px;
  }
  .det-content li {
    margin-bottom: 6px;
  }
  .det-content p { margin-bottom: 12px; }
  .det-content p:last-child { margin-bottom: 0; }
  .det-content code {
    background: var(--bg);
    padding: 2px 6px;
    font-family: var(--mono);
    font-size: 13px;
    border: 1px solid var(--border);
  }
  .det-content table {
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13.5px;
    width: 100%;
  }
  .det-content th, .det-content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .det-content th {
    background: var(--bg);
    color: var(--accent);
    font-weight: 500;
  }
  .det-content h4 {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--text);
    margin: 16px 0 8px 0;
    font-weight: 500;
  }

  /* Expand all controls */
  .results-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: flex-end;
  }
  .expand-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .expand-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .restart-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 20px;
    font-family: var(--tc);
    font-size: 16px;
    letter-spacing: 0.15em;
    cursor: pointer;
    margin-top: 32px;
    transition: all 0.2s ease;
  }
  .restart-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    padding: 40px;
    max-width: 440px;
    width: calc(100% - 64px);
    text-align: center;
  }
  .modal-title {
    font-family: var(--serif);
    font-size: 26px;
    margin-bottom: 12px;
  }
  .modal-text {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .modal-btns {
    display: flex;
    gap: 12px;
  }
  .modal-btn {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--tc);
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .modal-btn:hover { background: var(--bg-card); }
  .modal-btn.primary:hover { background: #e0b25a; }

  /* Context viewer modal */
  .ctx-modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
    backdrop-filter: blur(6px);
    padding: 24px;
    animation: ctxFadeIn 0.15s ease-out;
  }
  @keyframes ctxFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .ctx-modal {
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
  }
  .ctx-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  .ctx-modal-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
  }

<li>無法區分 spasticity vs contracture vs voluntary resistance</li>
<li>單一速度評估不夠完整</li>

<h4>Tardieu Scale 詳解（更精準的評估）</h4>

<p><strong>三種測試速度：</strong></p>
<table>
<tr><th>速度</th><th>定義</th><th>用途</th></tr>
<tr><td>V1</td><td>盡可能慢（slow as possible）</td><td>測 R2，反映 passive ROM</td></tr>
<tr><td>V2</td><td>重力速度（speed of limb falling）</td><td>較少用</td></tr>
<tr><td>V3</td><td>盡可能快（fast as possible）</td><td>測 R1，引發 spasticity catch</td></tr>
</table>

<p><strong>兩個關鍵角度：</strong></p>
<ul>
<li><strong>R1</strong>：V3 速度下，第一次出現 muscle reaction（catch、clonus、jerk）的角度</li>
<li><strong>R2</strong>：V1 速度下，passive 全 ROM 的最終角度</li>

<p><strong>判讀：</strong></p>
<ul>
<li><strong>R2 - R1 大</strong>：dynamic component 為主 → spasticity 治療有效（Botox、stretching）</li>
<li><strong>R2 - R1 小，R2 受限</strong>：structural component 為主（contracture）→ 需要手術或 serial casting</li>
<li><strong>R2 接近正常</strong>：可逆性高，治療預後好</li>
</ul>

<p><strong>Tardieu 反應品質分級（X grade）：</strong></p>
<ul>
<li>0 = 無阻力</li>
<li>1 = 輕微阻力，無明顯 catch</li>
<li>2 = 明顯 catch 後 release</li>
<li>3 = Fatigable clonus（&lt; 10 秒）</li>
<li>4 = Unfatigable clonus（&gt; 10 秒）</li>
<li>5 = 關節無法移動</li>
</ul>

<p style="background:var(--bg);padding:14px;border-left:2px solid var(--accent);margin:8px 0;">「照顧這樣嚴重腦傷的家人是非常辛苦的。但您不是一個人 — 我們有醫療團隊、長照系統、社工資源、病友家屬支持團體可以協助您。最重要的是：先照顧好自己，您才能持續照顧他。請使用喘息服務、不要拒絕別人的幫助。」</p>
<p style="background:var(--bg);padding:14px;border-left:2px solid var(--accent);margin:8px 0;">「您兒子未來幾年仍可能有進步，但也可能維持在現狀。我們會用最好的方法陪您一起走，並且隨時調整目標 — 讓他和您都能保有最好的生活品質。」</p>`,
      },
    ],
  },
];

const SECONDS_PER_CASE = 540;

const fmtTime = (s) => {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
};

const shuffle = (arr) => {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
};

const casesByDomain = (id) => CASES.filter(c => c.domain === id);

function Landing({ onStart }) {
  const [selectedDomain, setSelectedDomain] = useState(null);
  const [count, setCount] = useState(1);
  const availableCases = selectedDomain ? casesByDomain(selectedDomain) : [];
  const maxCount = availableCases.length;

  useEffect(() => {
    if (count > maxCount && maxCount > 0) setCount(maxCount);
  }, [selectedDomain, maxCount]);

  return (
    <div className="container">
      <div className="landing-header">
        <div className="eyebrow">Physical Medicine & Rehabilitation</div>
        <h1 className="landing-title">
          Oral Examination<br/>
          <span className="tc">復健科專科口試模擬</span>
        </h1>
        <p className="landing-sub">
          每大題九分鐘，模擬真實口試節奏。倒數結束自動結束本題。
          作答以口述為主，全部考完後一次顯示完整詳解。
        </p>
      </div>

      <div className="config-group">
        <div className="section-label">DOMAIN — 選擇領域</div>
        <div className="domain-grid">
          {DOMAINS.map((d, i) => {
            const n = casesByDomain(d.id).length;
            const disabled = n === 0;
            return (
              <button
                key={d.id}
                className={`domain-cell ${selectedDomain === d.id ? 'active' : ''}`}
                onClick={() => !disabled && setSelectedDomain(d.id)}
                disabled={disabled}
              >
                <div className="domain-num">{String(i+1).padStart(2,'0')}</div>
                <div className="domain-name-en">{d.en}</div>
                <div className="domain-name-tc">{d.tc}</div>
                <div className="domain-count">{n} CASE{n !== 1 ? 'S' : ''}</div>
              </button>
            );
          })}
        </div>
      </div>

      {selectedDomain && maxCount > 0 && (
        <>
          <div className="config-group">
            <div className="section-label">PRACTICE — 練習題數</div>
            <div className="config-label">本場練習大題數量（實際國考為 1 大題）</div>
            <div className="count-grid">
              {[1,2,3,4,5].map(n => (
                <button
                  key={n}
                  className={`count-btn ${count === n ? 'active' : ''}`}
                  onClick={() => setCount(n)}
                  disabled={n > maxCount}
                >
                  <span className="count-btn-label">模擬題</span>
                  <span className="count-btn-num">{n}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="info-grid">
            <div className="info-cell">
              <div className="info-cell-label">每大題時限</div>
              <div className="info-cell-value">9 分鐘</div>
            </div>
            <div className="info-cell">
              <div className="info-cell-label">小題進度</div>
              <div className="info-cell-value">手動控制</div>
            </div>
            <div className="info-cell">
              <div className="info-cell-label">作答方式</div>
              <div className="info-cell-value">純口述</div>
            </div>
          </div>

          <button className="start-btn" onClick={() => onStart(selectedDomain, count)}>
            開始模擬考試 →
          </button>
        </>
      )}

      {selectedDomain && maxCount === 0 && (
        <div style={{textAlign:'center', padding:'48px 0', color:'var(--text-faint)', fontFamily:'var(--mono)', fontSize:12, letterSpacing:'0.2em'}}>
          此領域題庫尚未建置
        </div>
      )}

      {!selectedDomain && (
        <div style={{textAlign:'center', padding:'48px 0', color:'var(--text-faint)', fontFamily:'var(--mono)', fontSize:12, letterSpacing:'0.2em'}}>
          請先選擇領域
        </div>
      )}
    </div>
  );
}

function CaseIntro({ caseData, idx, total, onReady }) {
  const domain = DOMAINS.find(d => d.id === caseData.domain);
  return (
    <div className="case-screen">
      <div className="case-header">
        <div className="case-title">臨床情境</div>
        <div className="case-progress">
          {domain && <span style={{color:'var(--accent)'}}>{domain.tc}</span>}
          {' · CASE '}{idx + 1} / {total}
        </div>
      </div>
      <div className="case-body">{caseData.context}</div>
      <button className="start-btn" onClick={onReady}>
        準備好了，開始作答 →
      </button>
      <div className="ready-note">
        進入後 9 分鐘倒數開始 · 自行掌控小題節奏
      </div>
    </div>
  );
}

function CaseRunner({ caseData, caseIdx, caseTotal, onCaseEnd }) {
  const [remaining, setRemaining] = useState(SECONDS_PER_CASE);
  const [qIdx, setQIdx] = useState(0);
  const [timeUp, setTimeUp] = useState(false);
  const [showEndConfirm, setShowEndConfirm] = useState(false);
  const [showContext, setShowContext] = useState(false);
  // qTimings[i] = { seconds: 累計秒數, timeout: bool, visited: bool }
  const [qTimings, setQTimings] = useState({});
  const totalQ = caseData.questions.length;
  const onCaseEndRef = useRef(onCaseEnd);
  onCaseEndRef.current = onCaseEnd;

  // 紀錄當前小題「這次進入」的開始時刻（以 case 開始後經過的秒數計）
  const qStartElapsedRef = useRef(0);
  // 用 ref 持有最新 qIdx 和 qTimings，避免 timer 拿到 stale closure
  const qIdxRef = useRef(qIdx);
  const qTimingsRef = useRef(qTimings);
  qIdxRef.current = qIdx;
  qTimingsRef.current = qTimings;

  useEffect(() => {
    setRemaining(SECONDS_PER_CASE);
    setQIdx(0);
    setTimeUp(false);
    setQTimings({});
    qStartElapsedRef.current = 0;
  }, [caseIdx]);

  useEffect(() => {
    if (timeUp) return;
    const timer = setInterval(() => {
      setRemaining(prev => {
        if (prev <= 1) {
          clearInterval(timer);
          // 計時器到 → 結算當前小題剩餘的這段時間，累計上去
          const elapsed = SECONDS_PER_CASE;
          const spentThisVisit = elapsed - qStartElapsedRef.current;
          const currentQ = qIdxRef.current;
          const prevTiming = qTimingsRef.current[currentQ];
          const accumulated = (prevTiming?.seconds || 0) + spentThisVisit;
          setQTimings(t => ({
            ...t,
            [currentQ]: { seconds: accumulated, timeout: true, visited: true }
          }));
          setTimeUp(true);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [caseIdx, timeUp]);

  // 將「這次停留在當前小題的時間」累加進去，並把 qStart 移到現在
  const accumulateCurrentQTime = () => {
    const elapsed = SECONDS_PER_CASE - remaining;
    const spentThisVisit = elapsed - qStartElapsedRef.current;
    if (spentThisVisit > 0) {
      setQTimings(t => {
        const prev = t[qIdx];
        return {
          ...t,
          [qIdx]: {
            seconds: (prev?.seconds || 0) + spentThisVisit,
            timeout: false,
            visited: true,
          }
        };
      });
    } else {
      // 即使停留 0 秒，也標記為 visited（代表使用者有經過這題）
      setQTimings(t => ({
        ...t,
        [qIdx]: { seconds: t[qIdx]?.seconds || 0, timeout: false, visited: true }
      }));
    }
    qStartElapsedRef.current = elapsed;
  };

  const handleNextQ = () => {
    if (qIdx + 1 < totalQ) {
      accumulateCurrentQTime();
      setQIdx(qIdx + 1);
    } else {
      setShowEndConfirm(true);
    }
  };

  const handlePrevQ = () => {
    if (qIdx > 0) {
      accumulateCurrentQTime();
      setQIdx(qIdx - 1);
    }
  };

  const handleConfirmEnd = () => {
    accumulateCurrentQTime();
    setShowEndConfirm(false);
    // 用 setTimeout 確保 state 更新後再傳出去
    setTimeout(() => {
      onCaseEndRef.current(qTimingsRef.current, qIdxRef.current);
    }, 0);
  };

  const handleTimeUpEnd = () => {
    onCaseEndRef.current(qTimingsRef.current, qIdxRef.current);
  };

  // 鍵盤快捷鍵
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'KeyH' || (e.code === 'Space' && !showEndConfirm && !timeUp)) {
        e.preventDefault();
        setShowContext(prev => !prev);
      } else if (e.code === 'Escape') {
        setShowContext(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showEndConfirm, timeUp]);

  const pct = (remaining / SECONDS_PER_CASE) * 100;
  const cls = remaining <= 60 ? 'danger' : '';
  const domain = DOMAINS.find(d => d.id === caseData.domain);

  return (
    <div className="question-screen">
      <div className="q-top">
        <div className="q-marker">
          {domain && <span className="accent">{domain.tc}</span>}
          {' · CASE '}{caseIdx + 1}/{caseTotal}{' · QUESTION '}{qIdx + 1}/{totalQ}
        </div>
        <div className={`timer ${cls}`}>{fmtTime(remaining)}</div>
      </div>

      <div className="progress-bar">
        <div className={`progress-fill ${cls}`} style={{width: `${pct}%`}}></div>
      </div>

      <div className="subq-dots">
        {Array.from({length: totalQ}).map((_, i) => (
          <div key={i} className={`subq-dot ${i < qIdx ? 'done' : i === qIdx ? 'current' : ''}`}></div>
        ))}
      </div>

      <div className="q-body">
        <div className="q-text">{caseData.questions[qIdx].q}</div>
      </div>

      <div className="q-controls">
        <button className="ctrl-btn" onClick={() => setShowContext(true)}>
          📋 查看題幹
        </button>
        <div className="q-btns">
          {qIdx > 0 && (
            <button className="ctrl-btn" onClick={handlePrevQ}>← 上一題</button>
          )}
          <button className="ctrl-btn primary" onClick={handleNextQ}>
            {qIdx + 1 < totalQ ? '下一題 →' : '完成此大題 ✓'}
          </button>
        </div>
      </div>

      {showContext && (
        <div className="ctx-modal-bg" onClick={() => setShowContext(false)}>
          <div className="ctx-modal" onClick={(e) => e.stopPropagation()}>
            <div className="ctx-modal-header">
              <div className="ctx-modal-title">CASE CONTEXT — 題幹</div>
              <button className="ctx-modal-close" onClick={() => setShowContext(false)}>
                關閉 ESC
              </button>
            </div>
            <div className="ctx-modal-body">{caseData.context}</div>
            <div className="ctx-modal-footer">
              快捷鍵 <kbd>H</kbd> 或 <kbd>SPACE</kbd> 開關 · 計時器持續進行
            </div>
          </div>
        </div>
      )}

      {timeUp && (
        <div className="timeup-overlay">
          <div className="timeup-mark">TIME UP</div>
          <div className="timeup-title">時間到</div>
          <div className="timeup-sub">本大題作答時間結束</div>
          <button className="start-btn" style={{maxWidth:280}} onClick={handleTimeUpEnd}>
            {caseIdx + 1 < caseTotal ? '進入下一大題 →' : '查看完整詳解 →'}
          </button>
        </div>
      )}

      {showEndConfirm && (
        <div className="modal-bg">
          <div className="modal">
            <div className="modal-title">結束此大題？</div>
            <div className="modal-text">你已回答完所有小題。確認結束後將進入下一階段，剩餘時間將不被使用。</div>
            <div className="modal-btns">
              <button className="modal-btn" onClick={() => setShowEndConfirm(false)}>繼續使用時間</button>
              <button className="modal-btn primary" onClick={handleConfirmEnd}>
                結束本大題
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Results({ selectedCases, caseTimings, onRestart }) {
  const [allOpen, setAllOpen] = useState(false);
  const [bulkKey, setBulkKey] = useState(0);

  const handleExpandAll = () => {
    setAllOpen(true);
    setBulkKey(k => k + 1);
  };
  const handleCollapseAll = () => {
    setAllOpen(false);
    setBulkKey(k => k + 1);
  };

  return (
    <div className="results-screen">
      <div className="results-header">
        <div className="eyebrow">Examination Complete</div>
        <h1 className="results-title">完整詳解</h1>
        <p className="results-sub">點擊任一題目可展開詳解。每題作答時間顯示於右側。</p>
      </div>

      <div className="results-controls">
        <button className="expand-btn" onClick={handleExpandAll}>全部展開</button>
        <button className="expand-btn" onClick={handleCollapseAll}>全部收起</button>
      </div>

      {selectedCases.map((c, ci) => {
        const domain = DOMAINS.find(d => d.id === c.domain);
        const timings = caseTimings[ci] || { timings: {}, lastQIdx: -1 };
        return (
          <div key={c.id} className="case-block">
            <div className="case-block-header">
              <div className="case-block-num">CASE {String(ci+1).padStart(2,'0')}</div>
              <div className="case-block-title">{c.title}</div>
              {domain && <div className="case-domain-tag">{domain.tc}</div>}
            </div>
            <div className="case-context">{c.context}</div>
            {c.questions.map((qa, qi) => (
              <QABlockWrapper
                key={`${ci}-${qi}-${bulkKey}`}
                qa={qa}
                qi={qi}
                timing={timings.timings[qi]}
                defaultOpen={allOpen}
              />
            ))}
          </div>
        );
      })}

      <button className="restart-btn" onClick={onRestart}>← 回到首頁</button>
    </div>
  );
}

function QABlockWrapper({ qa, qi, timing, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);

  let timeBadge;
  if (timing && timing.visited) {
    timeBadge = (
      <div className={`qa-time ${timing.timeout ? 'timeout' : ''}`}>
        {timing.timeout && '⏱ '}{fmtTime(timing.seconds)}{timing.timeout && ' · 時間到'}
      </div>
    );
  } else {
    timeBadge = <div className="qa-time unanswered">未作答</div>;
  }

  return (
    <div className="qa-block">
      <div className={`qa-card ${open ? 'open' : ''}`}>
        <div className="qa-summary" onClick={() => setOpen(!open)}>
          <span className="qa-chevron">▶</span>
          <span className="qa-q-num">Q{String(qi+1).padStart(2,'0')}</span>
          <span className="qa-q-summary">{qa.q}</span>
          {timeBadge}
        </div>
        {open && (
          <div className="qa-expanded">
            {(qa.keywords && qa.keywords.length > 0) && (
              <div className="det-section">
                <div className="det-section-label">關鍵字 KEYWORDS</div>
                <div className="keyword-list">
                  {qa.keywords.map((k, i) => (
                    <span key={i} className={`keyword-tag ${/^[A-Za-z0-9\s\-\/&,\.\(\)]+$/.test(k) ? 'en' : ''}`}>{k}</span>
                  ))}
                </div>
              </div>
            )}
            {(qa.points && qa.points.length > 0) && (
              <div className="det-section">
                <div className="det-section-label">應提到的要點 KEY POINTS</div>
                <ul className="points-list">
                  {qa.points.map((p, i) => (
                    <li key={i} dangerouslySetInnerHTML={{__html: p}}></li>
                  ))}
                </ul>
              </div>
            )}
            {qa.a && (
              <div className="det-section">
                <div className="det-section-label">完整詳解 DETAIL</div>
                <div className="det-content" dangerouslySetInnerHTML={{__html: qa.a}}></div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState('landing');
  const [selectedCases, setSelectedCases] = useState([]);
  const [caseIdx, setCaseIdx] = useState(0);
  // caseTimings[caseIndex] = { timings: {qIdx: {seconds, timeout}}, lastQIdx }
  const [caseTimings, setCaseTimings] = useState({});

  const handleStart = (domainId, count) => {
    const pool = casesByDomain(domainId);
    const picked = shuffle(pool).slice(0, count);
    setSelectedCases(picked);
    setCaseIdx(0);
    setCaseTimings({});
    setPhase('intro');
  };

  const handleReady = () => setPhase('running');

  const handleCaseEnd = (timings, lastQIdx) => {
    setCaseTimings(prev => ({
      ...prev,
      [caseIdx]: { timings: timings || {}, lastQIdx: lastQIdx ?? -1 }
    }));
    if (caseIdx + 1 < selectedCases.length) {
      setCaseIdx(caseIdx + 1);
      setPhase('intro');
    } else {
      setPhase('results');
    }
  };

  const handleRestart = () => {
    setPhase('landing');
    setSelectedCases([]);
    setCaseIdx(0);
    setCaseTimings({});
  };

  return (
    <>
      {phase === 'landing' && <Landing onStart={handleStart} />}
      {phase === 'intro' && (
        <CaseIntro caseData={selectedCases[caseIdx]} idx={caseIdx} total={selectedCases.length} onReady={handleReady} />
      )}
      {phase === 'running' && (
        <CaseRunner caseData={selectedCases[caseIdx]} caseIdx={caseIdx} caseTotal={selectedCases.length} onCaseEnd={handleCaseEnd} />
      )}
      {phase === 'results' && <Results selectedCases={selectedCases} caseTimings={caseTimings} onRestart={handleRestart} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
