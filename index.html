<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復健科專科口試模擬</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e0f;
    --bg-elev: #16181a;
    --bg-card: #1c1f22;
    --border: #2a2e33;
    --border-strong: #3a3f45;
    --text: #e8e6e1;
    --text-dim: #9ca0a6;
    --text-faint: #5a5e64;
    --accent: #d4a548;
    --accent-dim: #8a6a2c;
    --warn: #e07a5f;
    --danger: #c8553d;
    --serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
    --tc: 'Noto Serif TC', serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--tc);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.7;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 10%, rgba(212, 165, 72, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(212, 165, 72, 0.03) 0%, transparent 40%);
  }

  #root { min-height: 100vh; }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  .landing-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 48px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .landing-title {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 12px;
  }
  .landing-title .tc {
    font-family: var(--tc);
    font-weight: 500;
    letter-spacing: 0;
  }
  .landing-sub {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 560px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .domain-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 56px;
  }
  .domain-cell {
    background: var(--bg);
    padding: 28px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    border: none;
    color: var(--text);
    font-family: var(--tc);
    position: relative;
  }
  .domain-cell:hover:not(:disabled) { background: var(--bg-elev); }
  .domain-cell.active { background: rgba(212, 165, 72, 0.08); }
  .domain-cell.active::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .domain-cell:disabled { opacity: 0.35; cursor: not-allowed; }
  .domain-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
  }
  .domain-name-en {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 4px;
  }
  .domain-name-tc {
    font-family: var(--tc);
    font-size: 18px;
    font-weight: 500;
  }
  .domain-cell.active .domain-name-tc { color: var(--accent); }
  .domain-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    margin-top: 12px;
  }

  .config-group { margin-bottom: 40px; }
  .config-label {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .count-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .count-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 18px 10px;
    font-family: var(--tc);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .count-btn:hover:not(:disabled) {
    border-color: var(--border-strong);
    background: var(--bg-elev);
  }
  .count-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(212, 165, 72, 0.06);
  }
  .count-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .count-btn-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .count-btn.active .count-btn-label {
    color: var(--accent);
  }
  .count-btn-num {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
  }

  /* Case picker (replaces count selector) */
  .case-pick-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }
  .case-pick-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: grid;
    grid-template-columns: 110px 1fr auto auto;
    gap: 20px;
    align-items: center;
    text-align: left;
    font-family: var(--tc);
  }
  .case-pick-btn:hover {
    border-color: var(--accent);
    background: var(--bg-elev);
    transform: translateX(2px);
  }
  .case-pick-btn:hover .case-pick-arrow {
    color: var(--accent);
    transform: translateX(4px);
  }
  .case-pick-num {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
  }
  .case-pick-title {
    font-family: var(--tc);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .case-pick-meta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .case-pick-arrow {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--text-faint);
    transition: all 0.15s ease;
  }
  @media (max-width: 700px) {
    .case-pick-btn {
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px 18px;
    }
    .case-pick-num {
      grid-column: 1;
      grid-row: 1;
    }
    .case-pick-title {
      grid-column: 1;
      grid-row: 2;
      font-size: 15px;
    }
    .case-pick-meta {
      grid-column: 1;
      grid-row: 3;
    }
    .case-pick-arrow {
      grid-column: 2;
      grid-row: 1 / span 3;
      align-self: center;
    }
    .q-top {
      grid-template-columns: auto auto;
      grid-template-rows: auto auto;
      gap: 10px 16px;
    }
    .q-top .home-link {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
    }
    .q-top .timer {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      font-size: 32px;
    }
    .q-top .timer.danger { font-size: 44px; }
    .q-marker {
      grid-column: 1 / span 2;
      grid-row: 2;
      text-align: center;
    }
    .case-header {
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      gap: 14px 16px;
    }
    .case-header .home-link {
      grid-column: 1;
      grid-row: 1;
    }
    .case-progress {
      grid-column: 2;
      grid-row: 1;
      font-size: 11px;
    }
    .case-title {
      grid-column: 1 / span 2;
      grid-row: 2;
      font-size: 26px;
      text-align: left;
    }
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .info-cell {
    background: var(--bg);
    padding: 18px 22px;
  }
  .info-cell-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-cell-value {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--text);
  }

  .start-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 22px;
    font-family: var(--tc);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .start-btn:hover:not(:disabled) {
    background: #e0b25a;
    transform: translateY(-1px);
  }
  .start-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
    cursor: not-allowed;
    transform: none;
  }

  .case-screen {
    min-height: 100vh;
    padding: 48px 32px;
    max-width: 880px;
    margin: 0 auto;
  }
  .case-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 36px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: baseline;
    gap: 20px;
  }
  .case-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 500;
    text-align: center;
  }
  .case-progress {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: right;
    justify-self: end;
  }
  .case-body {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 36px 40px;
    margin-bottom: 32px;
    line-height: 1.85;
    font-size: 15.5px;
    white-space: pre-wrap;
  }
  .ready-note {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    text-align: center;
    margin: 24px 0;
  }

  /* Home link button (used in case header, q-top, results) */
  .home-link {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .home-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(-2px);
  }
  .results-home {
    margin-bottom: 18px;
  }

  .question-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 32px;
    max-width: 920px;
    margin: 0 auto;
  }
  .q-top {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .q-marker {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-faint);
    text-transform: uppercase;
    text-align: center;
  }
  .q-marker .accent { color: var(--accent); }
  .timer {
    font-family: var(--mono);
    font-size: 44px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: font-size 0.3s ease, color 0.3s ease;
  }
  .timer.warning { color: var(--warn); }
  .timer.danger {
    color: var(--danger);
    font-size: 64px;
    font-weight: 700;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
  }
  .progress-fill.warning { background: var(--warn); }
  .progress-fill.danger { background: var(--danger); }

  .subq-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 36px;
    justify-content: center;
  }
  .subq-dot {
    width: 28px;
    height: 4px;
    background: var(--border);
    transition: background 0.2s ease;
  }
  .subq-dot.done { background: var(--accent-dim); }
  .subq-dot.current { background: var(--accent); }

  .q-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 0;
    min-height: 320px;
  }
  .q-text {
    font-family: var(--tc);
    font-size: 26px;
    line-height: 1.55;
    font-weight: 400;
    text-align: left;
    max-width: 760px;
    color: var(--text);
  }

  .q-controls {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .q-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
  }
  .q-btns {
    display: flex;
    gap: 10px;
  }
  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }
  .ctrl-btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-btn.primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .timeup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 14, 15, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(8px);
    padding: 32px;
  }
  .timeup-mark {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--danger);
    margin-bottom: 16px;
  }
  .timeup-title {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .timeup-sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 40px;
  }

  .results-screen {
    padding: 48px 32px;
    max-width: 920px;
    margin: 0 auto;
  }
  .results-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 48px;
  }
  .results-title {
    font-family: var(--serif);
    font-size: 44px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .results-sub {
    color: var(--text-dim);
    font-size: 15px;
  }

  .case-block { margin-bottom: 64px; }
  .case-block-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .case-block-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.2em;
  }
  .case-block-title {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    flex: 1;
  }
  .case-domain-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 4px 10px;
  }
  .case-context {
    background: var(--bg-card);
    border-left: 2px solid var(--accent-dim);
    padding: 22px 28px;
    margin-bottom: 28px;
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text-dim);
    white-space: pre-wrap;
  }

  .qa-block {
    margin-bottom: 24px;
    padding-bottom: 0;
    border-bottom: none;
  }
  .qa-block:last-child { border-bottom: none; }

  /* Collapsible question block */
  .qa-card {
    border: 1px solid var(--border);
    background: var(--bg-card);
    transition: border-color 0.15s ease;
  }
  .qa-card.open {
    border-color: var(--border-strong);
  }
  .qa-summary {
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
    transition: background 0.15s ease;
  }
  .qa-summary:hover {
    background: var(--bg-elev);
  }
  .qa-chevron {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .qa-card.open .qa-chevron {
    transform: rotate(90deg);
    color: var(--accent);
  }
  .qa-q-summary {
    font-family: var(--tc);
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
  }
  .qa-q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    flex-shrink: 0;
  }
  .qa-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    white-space: nowrap;
    border: 1px solid var(--border);
    padding: 4px 10px;
    flex-shrink: 0;
  }
  .qa-time.timeout { color: var(--danger); border-color: var(--danger); }
  .qa-time.unanswered { color: var(--text-faint); opacity: 0.5; }

  .qa-expanded {
    border-top: 1px solid var(--border);
    padding: 4px 0;
  }

  /* Section: keywords */
  .det-section {
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
  }
  .det-section:last-child { border-bottom: none; }
  .det-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .det-section-label::before {
    content: '◆';
    font-size: 8px;
  }

  .keyword-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .keyword-tag {
    background: rgba(212, 165, 72, 0.08);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    padding: 5px 11px;
    font-family: var(--tc);
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .keyword-tag.en {
    font-family: var(--mono);
    font-size: 12px;
  }

  .points-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .points-list li {
    padding: 6px 0 6px 22px;
    position: relative;
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--text);
  }
  .points-list li::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 14px;
    width: 6px;
    height: 1px;
    background: var(--accent);
  }
  .points-list li strong {
    color: var(--accent);
    font-weight: 500;
  }

  .det-content {
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text);
  }
  .det-content strong {
    color: var(--accent);
    font-weight: 500;
  }
  .det-content ul, .det-content ol {
    margin: 8px 0 12px 20px;
  }
  .det-content li {
    margin-bottom: 6px;
  }
  .det-content p { margin-bottom: 12px; }
  .det-content p:last-child { margin-bottom: 0; }
  .det-content code {
    background: var(--bg);
    padding: 2px 6px;
    font-family: var(--mono);
    font-size: 13px;
    border: 1px solid var(--border);
  }
  .det-content table {
    border-collapse: collapse;
    margin: 12px 0;

<p><strong>2. 中風本身因素：</strong></p>
<ul>

    <li>NIHSS 5-15：中度</li>

</li>
<li>出血量（hemorrhagic）：&gt;30 mL 預後差，&gt;60 mL 死亡率極高</li>
<li>病灶位置：

</li>
<li>IVH（intraventricular hemorrhage）：預後不佳因子</li>

<li>初始 GCS：低 GCS 預後差</li>

<ul>

        a: `<h4>脊髓血供解剖</h4>

<p><strong>三條主要動脈：</strong></p>
<ul>
<li><strong>1 條 Anterior Spinal Artery (ASA)</strong>：兩側 vertebral artery 內側支匯合而成，沿脊髓前正中溝下行</li>
<li><strong>2 條 Posterior Spinal Arteries</strong>：來自 vertebral artery 或 PICA，沿脊髓後外側下行</li>
</ul>

<p><strong>Radiculomedullary Arteries（節段性補強）：</strong></p>
<ul>
<li>來自 vertebral、ascending cervical、intercostal、lumbar arteries</li>
<li>分 anterior 與 posterior radiculomedullary arteries</li>
<li>每隔幾節脊髓有一條補強</li>
<li><strong>Artery of Adamkiewicz（great anterior radiculomedullary artery）</strong>：
  <ul>
    <li>最大的 anterior radiculomedullary artery</li>
    <li>75% 起自 T9-T12，左側為主</li>
    <li>供應 lower thoracic + lumbar cord</li>
    <li>Aortic surgery（如本病人 EVAR）易傷及</li>
  </ul>
</li>
</ul>

<p><strong>供應區域：</strong></p>
<ul>
<li><strong>ASA</strong>（anterior 2/3 of cord）：anterior horn（motor neurons）、corticospinal tract、spinothalamic tract、anterior + lateral funiculi</li>
<li><strong>Posterior spinal arteries</strong>（posterior 1/3）：dorsal columns、part of dorsal horn</li>
</ul>

<p><strong>Watershed Zone：</strong></p>
<ul>
<li><strong>T4-T9</strong>：節段性血供最稀疏（distance 最遠 from 主要 inflow）</li>
<li>最易 hypoperfusion 受害</li>
<li>Aortic cross-clamp、severe hypotension 時 vulnerable</li>
</ul>

<h4>Anterior Spinal Artery Syndrome 臨床表現</h4>

<p><strong>典型臨床三聯：</strong></p>
<ol>
<li><strong>突發劇烈背痛</strong>（病灶部位）</li>
<li><strong>急性 bilateral motor loss</strong>：lesion level 以下癱瘓</li>

  <li><strong>Vibration & proprioception 保留</strong>（dorsal columns 由 posterior spinal artery 供應）</li>
</ul>
</ol>

<p><strong>其他特徵：</strong></p>
<ul>
<li>急性 flaccid paralysis（spinal shock 期）→ 數天至數週後 spasticity 出現</li>
<li>Bowel & bladder dysfunction（autonomic 受影響）</li>
<li>Sexual dysfunction</li>
<li>若 lesion &gt; T6 → autonomic dysreflexia 風險</li>
<li>若 lesion &gt; C5 → respiratory compromise（diaphragm C3-5 supplied）</li>
</ul>

        a: `<h4>ASIA Examination 標準流程</h4>

<p><strong>正式名稱：International Standards for Neurological Classification of Spinal Cord Injury (ISNCSCI)</strong>，由 ASIA + ISCoS 維護，每幾年更新一次（最新 2019 版）。</p>

<h4>1. Sensory Examination</h4>

<p><strong>28 個 key dermatomes 兩側</strong>（C2 到 S4/5）：</p>
<ul>
<li>每個 dermatome 測 <strong>pinprick</strong> + <strong>light touch</strong></li>
<li>計分：0 = absent、1 = altered、2 = normal、NT = not testable</li>
<li>每側總分上限 56（28 × 2）；兩種感覺各 112 分</li>
</ul>

<p><strong>關鍵 dermatome landmarks：</strong></p>
<table>
<tr><th>Level</th><th>Landmark</th></tr>
<tr><td>C2</td><td>後枕</td></tr>
<tr><td>C4</td><td>鎖骨上窩</td></tr>
<tr><td>C7</td><td>中指</td></tr>
<tr><td>T4</td><td>乳頭</td></tr>
<tr><td>T6</td><td>劍突</td></tr>
<tr><td>T10</td><td>肚臍</td></tr>
<tr><td>L1</td><td>腹股溝</td></tr>
<tr><td>L4</td><td>內踝</td></tr>
<tr><td>L5</td><td>第 3 蹠骨背</td></tr>
<tr><td>S1</td><td>外踝</td></tr>
<tr><td>S2-S4/5</td><td>會陰</td></tr>
</table>

<h4>2. Motor Examination</h4>

<p><strong>10 個 key muscles 兩側：</strong></p>
<table>
<tr><th>Level</th><th>Muscle</th><th>動作</th></tr>
<tr><td>C5</td><td>Biceps</td><td>Elbow flexion</td></tr>
<tr><td>C6</td><td>ECRL/ECRB</td><td>Wrist extension</td></tr>
<tr><td>C7</td><td>Triceps</td><td>Elbow extension</td></tr>
<tr><td>C8</td><td>FDP（中指）</td><td>Finger flexion</td></tr>
<tr><td>T1</td><td>ADM</td><td>Finger abduction</td></tr>
<tr><td>L2</td><td>Iliopsoas</td><td>Hip flexion</td></tr>
<tr><td>L3</td><td>Quadriceps</td><td>Knee extension</td></tr>
<tr><td>L4</td><td>Tibialis anterior</td><td>Ankle dorsiflexion</td></tr>
<tr><td>L5</td><td>EHL</td><td>Great toe extension</td></tr>
<tr><td>S1</td><td>Gastrocnemius</td><td>Ankle plantarflexion</td></tr>
</table>

<p><strong>計分</strong>：0-5 MMT；每側上限 50（5 上肢 + 5 下肢 × 5）；兩側總分 100。</p>

<h4>3. Sacral Examination（決定 complete vs incomplete 關鍵）</h4>

<ul>
<li><strong>S4/5 light touch + pinprick</strong>：肛門周圍</li>
<li><strong>Deep Anal Pressure (DAP)</strong>：肛診壓 anorectal junction，病人是否能感覺到 pressure（yes/no）</li>
<li><strong>Voluntary Anal Contraction (VAC)</strong>：請病人收縮肛門，肛診感覺收縮（yes/no）</li>
</ul>

<p><strong>Sacral sparing 定義</strong>：S4-5 light touch 或 pinprick 任一存在、或 DAP +、或 VAC + → 即有 sacral sparing → incomplete injury</p>

<h4>4. 決定 Levels</h4>

<p><strong>Sensory Level</strong>：兩側分別最 caudal 的 normal（pinprick + light touch 都 = 2）的 dermatome</p>

<p><strong>Motor Level</strong>：</p>
<ul>
<li>有 myotome 的 levels：那個 key muscle 力量 ≥ 3 且其上所有 muscles = 5</li>
<li>沒有 myotome 的 levels（T2-L1, S2-S5）：等於 sensory level</li>
</ul>

<p><strong>Neurological Level of Injury (NLI)</strong>：sensory + motor levels 中 most rostral</p>

<p><strong>Zone of Partial Preservation (ZPP)</strong>：在 complete injury（AIS A）下，NLI 以下仍有 partial 功能的 dermatomes/myotomes 範圍</p>

<h4>5. AIS Grade</h4>

<table>
<tr><th>Grade</th><th>定義</th></tr>
<tr><td><strong>A</strong></td><td>Complete：no sensory or motor below NLI，NO sacral sparing（無 S4-5 sensation、無 VAC）</td></tr>
<tr><td><strong>B</strong></td><td>Sensory incomplete：有 sacral sensory sparing，但無 motor function more than 3 levels below motor level（兩側）</td></tr>
<tr><td><strong>C</strong></td><td>Motor incomplete：有 motor function below NLI（including VAC 或 motor &gt; 3 levels below motor level），但 &lt; 50% key muscles below NLI ≥ 3</td></tr>
<tr><td><strong>D</strong></td><td>Motor incomplete：≥ 50% key muscles below NLI ≥ 3</td></tr>
<tr><td><strong>E</strong></td><td>Normal：previously 有 deficit 但已恢復</td></tr>
</table>

<tr><td>Incomplete UMN</td><td>Both possibly preserved</td><td>Variable</td><td>Variable</td></tr>
<tr><td>Complete LMN（sacral）</td><td>Reflexogenic 失；psychogenic 可能</td><td>Lost</td><td>Lost</td></tr>
<tr><td>Incomplete LMN</td><td>Variable</td><td>Variable</td><td>Variable</td></tr>
</table>

<p><strong>本病人 T8 incomplete</strong>：reflex erection 多保留；psychogenic erection 可能受損；ejaculation 困難常見。</p>

<p><strong>Erectile dysfunction 治療：</strong></p>
<ul>
<li><strong>PDE5 inhibitor（首選）</strong>：sildenafil 50-100 mg、tadalafil 20 mg、vardenafil — SCI 病人 generally well-tolerated；注意：BP 影響、與 nitrate 禁忌（本病人 ASA event 後可能 nitrate 用藥需考慮）</li>
<li><strong>Vacuum erection device（VED）</strong>：non-pharmacological；sustained erection &lt; 30 min</li>
<li><strong>Intracavernosal injection（ICI）</strong>：alprostadil 5-20 mcg；priapism risk（SCI 病人 reduced sensation 警覺度低）</li>
<li><strong>Penile prosthesis</strong>：last resort；risk of erosion in SCI（reduced sensation）</li>
</ul>

<p><strong>Fertility（若有 reproduction 需求 — 本病人 68 歲較不適用，但 generic）：</strong></p>
<ul>
<li><strong>Penile vibratory stimulation (PVS)</strong>：first-line for ejaculation</li>
<li><strong>Electroejaculation (EEJ)</strong>：rectal probe、需麻醉、PVS 失敗時</li>
<li><strong>Testicular sperm extraction (TESE)</strong>：上述失敗時</li>
<li>Sperm quality 通常 reduced（temperature、antibody、infection）</li>
</ul>

<p><strong>Female SCI 性功能：</strong></p>
<ul>
<li>Lubrication 可能 reduced</li>
<li>Orgasm 部分病人保留</li>
<li>Fertility 通常 preserved（停經前）</li>
<li>懷孕高 risk（AD、UTI、pressure ulcer、DVT）</li>
</ul>

<p><strong>溝通原則：</strong></p>
<ul>
<li>主動詢問（病人常不敢提）</li>
<li>包含 partner（如願意）</li>
<li>Non-judgmental</li>
<li>提供書面資料 + 適當轉介（urology、psychology、fertility）</li>
</ul>

<h4>Bowel Program</h4>

<p><strong>SCI bowel dysfunction：</strong></p>
<ul>
<li>UMN bowel（本病人 T8）：reflex bowel — 排便 reflex 保留但無自主控制</li>
<li>LMN bowel（cauda）：areflexic — 需 manual evacuation</li>
</ul>

<p><strong>本病人 UMN bowel program：</strong></p>
<ul>
<li>每日或隔日 routine（最好飯後 30 分鐘 — gastrocolic reflex）</li>
<li>方法：digital stimulation（直腸 1-2 分鐘）+ /或 suppository（bisacodyl、glycerin）+ /或 mini-enema</li>
<li>Stool softener（docusate）</li>
<li>Fiber（25-30 g/day）+ 充足水分</li>
<li>必要時 laxative（PEG、senna）</li>
<li>避免 constipation 與 fecal impaction（AD trigger）</li>
<li>避免 chronic 用 stimulant laxative</li>
</ul>

<p><strong>Long-term：</strong></p>
<ul>
<li>Routine 建立後 stable</li>
<li>避免 mega-colon（bowel 過度 distended）</li>
<li>家屬訓練</li>
<li>外傭 / caregiver 一定要會</li>
</ul>

<h4>Driving</h4>

<p><strong>SCI 病人開車（即使 paraplegia）多數可恢復</strong>，with adaptation。</p>

<p><strong>評估流程：</strong></p>
<ol>
<li><strong>Medical clearance</strong>：6-12 個月後、stable、無 AD、cognitive OK、vision OK</li>
<li><strong>Adaptive driving evaluation</strong>：由認證 OT / driving rehab specialist 執行
  <ul>
    <li>Cognitive、visual、reaction time</li>
    <li>Driving simulator</li>
    <li>On-road test with adapted vehicle</li>
  </ul>
</li>
<li><strong>Vehicle modification</strong>：
  <ul>
    <li>Hand controls（hand-operated accelerator + brake）</li>
    <li>Spinner knob on steering wheel</li>
    <li>Wheelchair lift / ramp</li>
    <li>Adapted seat、lumbar support</li>
    <li>Power doors</li>
  </ul>
</li>
<li><strong>監理所複檢</strong>：身障駕照</li>
<li><strong>保險</strong>：告知保險公司 disability + 改裝</li>
</ol>

<p><strong>本病人</strong>：68 歲 + comorbidity → 評估時要 thorough；家屬可能擔心，需平衡 autonomy 與 safety。可考慮先讓家屬接送 6 個月，評估恢復狀況再考慮自駕。</p>

<h4>Return to Work（金融業中階主管）</h4>

<p><strong>關鍵</strong>：金融業中階主管 = predominantly sedentary、cognitive、computer-based — 是 SCI 病人 RTW 較理想 case！</p>

<p><strong>RTW 評估：</strong></p>
<ol>
<li><strong>Medical readiness</strong>：3-6 個月後、stable、bowel/bladder routine 建立</li>
<li><strong>Functional capacity evaluation</strong>：sitting tolerance、cognitive endurance、ADL independence</li>
<li><strong>Job analysis</strong>：原工作的 essential functions
  <ul>
    <li>會議（多）— OK</li>
    <li>電腦工作（多）— OK</li>
    <li>客戶 visit — 需 modify or telework</li>
    <li>出差 — 困難</li>
    <li>長時間 sitting — 需 cushion + 定時 weight shift</li>
  </ul>
</li>
<li><strong>Workplace accommodation</strong>：
  <ul>
    <li>無障礙辦公空間（lift、parking、bathroom）</li>
    <li>Adjustable desk（適合 wheelchair）</li>
    <li>彈性工時（早期可能僅半天）</li>
    <li>Telework / hybrid（重要！）</li>
    <li>減少出差、限制差旅</li>
    <li>Restroom break flexibility（CIC schedule）</li>
    <li>每 30 分 weight shift 提醒</li>
  </ul>
</li>
<li><strong>Phased return</strong>：
  <ul>
    <li>Stage 1：part-time telework（2-3 days/wk × 4 hr）</li>
    <li>Stage 2：3-4 days/wk × 6 hr，hybrid</li>
    <li>Stage 3：full-time（如可勝任）</li>
  </ul>
</li>
<li><strong>Workplace 同事教育</strong>：適當 disclosure、避免 awkwardness</li>
</ol>

<p><strong>不適合 RTW 的考量</strong>：</p>
<ul>
<li>嚴重 fatigue</li>
<li>Refractory pain</li>
<li>Cognitive impairment</li>
<li>Recurrent UTI / pressure ulcer 影響工作出席</li>
<li>家庭照顧 demand 太高</li>
<li>個人意願（合理 retirement）</li>
</ul>

<p><strong>退休決策：</strong></p>
<ul>
<li>不應 default 為退休（部分病人覺得失去 identity）</li>
<li>金融業中階主管 + 68 歲 = 接近退休年齡，個人決定合理</li>
<li>若選擇退休：勞保失能年金、勞退、退休金 well-planned</li>
<li>若選擇 RTW：與公司 HR、勞工事務局、復健團隊協作</li>
<li>Hybrid：part-time consultation、guidance role、保留 income + identity</li>
</ul>

<p><strong>勞保失能給付（如選擇退出）：</strong></p>
<ul>
<li>第 4 等級（嚴重 SCI 多評為此級或更重）</li>
<li>失能年金 vs 失能一次金 — 由勞保局核定</li>
<li>需身障證明 + 醫師鑑定</li>
<li>申請流程：可請社工協助</li>
</ul>

<h4>Long-term QoL Outcomes</h4>

<p><strong>SCI long-term life satisfaction：</strong></p>
<ul>
<li>10-20 年 follow-up：60-70% 報告 life satisfaction 與健康人相當</li>
<li>關鍵因素：家庭支持、財務穩定、社區參與、有意義活動</li>
<li>反 — 預期：身體 deficits 嚴重程度與 QoL 相關性弱（適應能力強）</li>
</ul>

<p><strong>常見挑戰：</strong></p>
<ul>
<li>Pressure ulcer recurrent（30-50% 一生中至少一次）</li>
<li>UTI recurrent</li>
<li>慢性疼痛（30-60%）</li>
<li>Depression（持續）</li>
<li>Sexual dysfunction</li>
<li>Fertility issues（年輕病人）</li>
<li>社交孤立</li>
<li>Caregiver burden</li>
<li>Aging with SCI（accelerated aging — shoulder OA from wheelchair propulsion、early cardiovascular events、osteoporosis）</li>
</ul>

<p><strong>正向因素：</strong></p>
<ul>
<li>Adaptive sports、社區活動</li>
<li>支持團體（脊髓損傷協會）</li>
<li>Vocational fulfillment</li>
<li>家庭關係 deepen</li>
<li>新 hobbies、values</li>
</ul>

<h4>本病人具體 Long-term Plan</h4>

<p><strong>第一年：</strong></p>
<ul>
<li>每 1-3 個月復健科追蹤</li>
<li>EVAR follow-up CTA + vascular surgeon 共同照護</li>
<li>VUDS baseline + 必要時 repeat</li>
<li>FES cycling、Botox、ITB 評估（如需要）</li>
<li>身障鑑定 + 長照 2.0</li>
<li>家庭環境改造 complete</li>
<li>RTW 評估（與公司溝通）</li>
<li>Adaptive driving evaluation</li>
<li>性功能、bowel program 諮詢</li>
</ul>

<p><strong>1-3 年：</strong></p>
<ul>
<li>每 6 個月復健科</li>
<li>每年 EVAR CTA</li>
<li>每年 cardiac、lipid、HbA1c</li>
<li>每年 renal sonography + UA</li>
<li>每年 DEXA</li>
<li>每年 VUDS（前 5 年）</li>
<li>RTW stable 或 retirement adjusted</li>
<li>Caregiver burden 監測</li>
<li>社交支持團體</li>
</ul>

<p><strong>長期（&gt; 3 年）：</strong></p>
<ul>
<li>持續 surveillance</li>
<li>Aging with SCI 議題：shoulder OA、osteoporosis 進展、cognitive decline</li>
<li>End-of-life planning（advance directive）</li>
<li>Caregiver succession（妻子也老化）</li>
</ul>

const SECONDS_PER_CASE = 540;

const fmtTime = (s) => {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
};

const shuffle = (arr) => {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
};

function CaseRunner({ caseData, onCaseEnd, onHome }) {
  const [remaining, setRemaining] = useState(SECONDS_PER_CASE);
  const [qIdx, setQIdx] = useState(0);
  const [timeUp, setTimeUp] = useState(false);
  const [showEndConfirm, setShowEndConfirm] = useState(false);
  const [showContext, setShowContext] = useState(false);
  const [showHomeConfirm, setShowHomeConfirm] = useState(false);
  // qTimings[i] = { seconds: 累計秒數, timeout: bool, visited: bool }
  const [qTimings, setQTimings] = useState({});
  const totalQ = caseData.questions.length;
  const onCaseEndRef = useRef(onCaseEnd);
  onCaseEndRef.current = onCaseEnd;

  // 紀錄當前小題「這次進入」的開始時刻（以 case 開始後經過的秒數計）
  const qStartElapsedRef = useRef(0);
  // 用 ref 持有最新 qIdx 和 qTimings，避免 timer 拿到 stale closure
  const qIdxRef = useRef(qIdx);
  const qTimingsRef = useRef(qTimings);
  qIdxRef.current = qIdx;
  qTimingsRef.current = qTimings;

  useEffect(() => {
    setRemaining(SECONDS_PER_CASE);
    setQIdx(0);
    setTimeUp(false);
    setQTimings({});
    qStartElapsedRef.current = 0;
  }, [caseData.id]);

  useEffect(() => {
    if (timeUp) return;
    const timer = setInterval(() => {
      setRemaining(prev => {
        if (prev <= 1) {
          clearInterval(timer);
          // 計時器到 → 結算當前小題剩餘的這段時間，累計上去
          const elapsed = SECONDS_PER_CASE;
          const spentThisVisit = elapsed - qStartElapsedRef.current;
          const currentQ = qIdxRef.current;
          const prevTiming = qTimingsRef.current[currentQ];
          const accumulated = (prevTiming?.seconds || 0) + spentThisVisit;
          setQTimings(t => ({
            ...t,
            [currentQ]: { seconds: accumulated, timeout: true, visited: true }
          }));
          setTimeUp(true);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [caseData.id, timeUp]);

  // 將「這次停留在當前小題的時間」累加進去，並把 qStart 移到現在
  const accumulateCurrentQTime = () => {
    const elapsed = SECONDS_PER_CASE - remaining;
    const spentThisVisit = elapsed - qStartElapsedRef.current;
    if (spentThisVisit > 0) {
      setQTimings(t => {
        const prev = t[qIdx];
        return {
          ...t,
          [qIdx]: {
            seconds: (prev?.seconds || 0) + spentThisVisit,
            timeout: false,
            visited: true,
          }
        };
      });
    } else {
      // 即使停留 0 秒，也標記為 visited（代表使用者有經過這題）
      setQTimings(t => ({
        ...t,
        [qIdx]: { seconds: t[qIdx]?.seconds || 0, timeout: false, visited: true }
      }));
    }
    qStartElapsedRef.current = elapsed;
  };

  const handleNextQ = () => {
    if (qIdx + 1 < totalQ) {
      accumulateCurrentQTime();
      setQIdx(qIdx + 1);
    } else {
      setShowEndConfirm(true);
    }
  };

  const handlePrevQ = () => {
    if (qIdx > 0) {
      accumulateCurrentQTime();
      setQIdx(qIdx - 1);
    }
  };

  const handleConfirmEnd = () => {
    accumulateCurrentQTime();
    setShowEndConfirm(false);
    // 用 setTimeout 確保 state 更新後再傳出去
    setTimeout(() => {
      onCaseEndRef.current(qTimingsRef.current, qIdxRef.current);
    }, 0);
  };

  const handleTimeUpEnd = () => {
    onCaseEndRef.current(qTimingsRef.current, qIdxRef.current);
  };

  // 鍵盤快捷鍵
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'KeyH' || (e.code === 'Space' && !showEndConfirm && !timeUp)) {
        e.preventDefault();
        setShowContext(prev => !prev);
      } else if (e.code === 'Escape') {
        setShowContext(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showEndConfirm, timeUp]);

  const pct = (remaining / SECONDS_PER_CASE) * 100;
  const cls = remaining <= 60 ? 'danger' : '';
  const domain = DOMAINS.find(d => d.id === caseData.domain);

  return (
    <div className="question-screen">
      <div className="q-top">
        <button className="home-link" onClick={() => setShowHomeConfirm(true)}>
          ← 回首頁
        </button>
        <div className="q-marker">
          {domain && <span className="accent">{domain.tc}</span>}
          {' · QUESTION '}{qIdx + 1}/{totalQ}
        </div>
        <div className={`timer ${cls}`}>{fmtTime(remaining)}</div>
      </div>

      <div className="progress-bar">
        <div className={`progress-fill ${cls}`} style={{width: `${pct}%`}}></div>
      </div>

      <div className="subq-dots">
        {Array.from({length: totalQ}).map((_, i) => (
          <div key={i} className={`subq-dot ${i < qIdx ? 'done' : i === qIdx ? 'current' : ''}`}></div>
        ))}
      </div>

      <div className="q-body">
        <div className="q-text">{caseData.questions[qIdx].q}</div>
      </div>

      <div className="q-controls">
        <button className="ctrl-btn" onClick={() => setShowContext(true)}>
          📋 查看題幹
        </button>
        <div className="q-btns">
          {qIdx > 0 && (
            <button className="ctrl-btn" onClick={handlePrevQ}>← 上一題</button>
          )}
          <button className="ctrl-btn primary" onClick={handleNextQ}>
            {qIdx + 1 < totalQ ? '下一題 →' : '完成此大題 ✓'}
          </button>
        </div>
      </div>

      {showContext && (
        <div className="ctx-modal-bg" onClick={() => setShowContext(false)}>
          <div className="ctx-modal" onClick={(e) => e.stopPropagation()}>
            <div className="ctx-modal-header">
              <div className="ctx-modal-title">CASE CONTEXT — 題幹</div>
              <button className="ctx-modal-close" onClick={() => setShowContext(false)}>
                關閉 ESC
              </button>
            </div>
            <div className="ctx-modal-body">{caseData.context}</div>
            <div className="ctx-modal-footer">
              快捷鍵 <kbd>H</kbd> 或 <kbd>SPACE</kbd> 開關 · 計時器持續進行
            </div>
          </div>
        </div>
      )}

      {timeUp && (
        <div className="timeup-overlay">
          <div className="timeup-mark">TIME UP</div>
          <div className="timeup-title">時間到</div>
          <div className="timeup-sub">本大題作答時間結束</div>
          <button className="start-btn" style={{maxWidth:280}} onClick={handleTimeUpEnd}>
            查看完整詳解 →
          </button>
        </div>
      )}

      {showEndConfirm && (
        <div className="modal-bg">
          <div className="modal">
            <div className="modal-title">結束此大題？</div>
            <div className="modal-text">你已回答完所有小題。確認結束後將進入下一階段，剩餘時間將不被使用。</div>
            <div className="modal-btns">
              <button className="modal-btn" onClick={() => setShowEndConfirm(false)}>繼續使用時間</button>
              <button className="modal-btn primary" onClick={handleConfirmEnd}>
                結束本大題
              </button>
            </div>
          </div>
        </div>
      )}

      {showHomeConfirm && (
        <div className="modal-bg">
          <div className="modal">
            <div className="modal-title">回到首頁？</div>
            <div className="modal-text">目前作答進度與計時將不會保留。確認離開？</div>
            <div className="modal-btns">
              <button className="modal-btn" onClick={() => setShowHomeConfirm(false)}>繼續作答</button>
              <button className="modal-btn primary" onClick={onHome}>
                離開回首頁
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Results({ activeCase, caseTiming, onRestart }) {
  const [allOpen, setAllOpen] = useState(false);
  const [bulkKey, setBulkKey] = useState(0);

  const handleExpandAll = () => {
    setAllOpen(true);
    setBulkKey(k => k + 1);
  };
  const handleCollapseAll = () => {
    setAllOpen(false);
    setBulkKey(k => k + 1);
  };

  if (!activeCase) {
    return (
      <div className="results-screen">
        <button className="restart-btn" onClick={onRestart}>← 回到首頁</button>
      </div>
    );
  }

  const domain = DOMAINS.find(d => d.id === activeCase.domain);
  const timings = caseTiming || { timings: {}, lastQIdx: -1 };

  return (
    <div className="results-screen">
      <div className="results-header">
        <button className="home-link results-home" onClick={onRestart}>← 回首頁</button>
        <div className="eyebrow">Examination Complete</div>
        <h1 className="results-title">完整詳解</h1>
        <p className="results-sub">點擊任一題目可展開詳解。每題作答時間顯示於右側。</p>
      </div>

      <div className="results-controls">
        <button className="expand-btn" onClick={handleExpandAll}>全部展開</button>
        <button className="expand-btn" onClick={handleCollapseAll}>全部收起</button>
      </div>

      <div className="case-block">
        <div className="case-block-header">
          <div className="case-block-num">CASE</div>
          <div className="case-block-title">{activeCase.title}</div>
          {domain && <div className="case-domain-tag">{domain.tc}</div>}
        </div>
        <div className="case-context">{activeCase.context}</div>
        {activeCase.questions.map((qa, qi) => (
          <QABlockWrapper
            key={`${qi}-${bulkKey}`}
            qa={qa}
            qi={qi}
            timing={timings.timings[qi]}
            defaultOpen={allOpen}
          />
        ))}
      </div>

      <button className="restart-btn" onClick={onRestart}>← 回到首頁</button>
    </div>
  );
}

function QABlockWrapper({ qa, qi, timing, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);

  let timeBadge;
  if (timing && timing.visited) {
    timeBadge = (
      <div className={`qa-time ${timing.timeout ? 'timeout' : ''}`}>
        {timing.timeout && '⏱ '}{fmtTime(timing.seconds)}{timing.timeout && ' · 時間到'}
      </div>
    );
  } else {
    timeBadge = <div className="qa-time unanswered">未作答</div>;
  }

  return (
    <div className="qa-block">
      <div className={`qa-card ${open ? 'open' : ''}`}>
        <div className="qa-summary" onClick={() => setOpen(!open)}>
          <span className="qa-chevron">▶</span>
          <span className="qa-q-num">Q{String(qi+1).padStart(2,'0')}</span>
          <span className="qa-q-summary">{qa.q}</span>
          {timeBadge}
        </div>
        {open && (
          <div className="qa-expanded">
            {(qa.keywords && qa.keywords.length > 0) && (
              <div className="det-section">
                <div className="det-section-label">關鍵字 KEYWORDS</div>
                <div className="keyword-list">
                  {qa.keywords.map((k, i) => (
                    <span key={i} className={`keyword-tag ${/^[A-Za-z0-9\s\-\/&,\.\(\)]+$/.test(k) ? 'en' : ''}`}>{k}</span>
                  ))}
                </div>
              </div>
            )}
            {(qa.points && qa.points.length > 0) && (
              <div className="det-section">
                <div className="det-section-label">應提到的要點 KEY POINTS</div>
                <ul className="points-list">
                  {qa.points.map((p, i) => (
                    <li key={i} dangerouslySetInnerHTML={{__html: p}}></li>
                  ))}
                </ul>
              </div>
            )}
            {qa.a && (
              <div className="det-section">
                <div className="det-section-label">完整詳解 DETAIL</div>
                <div className="det-content" dangerouslySetInnerHTML={{__html: qa.a}}></div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState('landing');
  const [activeCase, setActiveCase] = useState(null);
  // caseTiming = { timings: {qIdx: {seconds, timeout}}, lastQIdx }
  const [caseTiming, setCaseTiming] = useState({ timings: {}, lastQIdx: -1 });

  const handleStart = (caseObj) => {
    setActiveCase(caseObj);
    setCaseTiming({ timings: {}, lastQIdx: -1 });
    setPhase('intro');
  };

  const handleReady = () => setPhase('running');

  const handleCaseEnd = (timings, lastQIdx) => {
    setCaseTiming({ timings: timings || {}, lastQIdx: lastQIdx ?? -1 });
    setPhase('results');
  };

  const handleRestart = () => {
    setPhase('landing');
    setActiveCase(null);
    setCaseTiming({ timings: {}, lastQIdx: -1 });
  };

  return (
    <>
      {phase === 'landing' && <Landing onStart={handleStart} />}
      {phase === 'intro' && (
        <CaseIntro caseData={activeCase} onReady={handleReady} onHome={handleRestart} />
      )}
      {phase === 'running' && (
        <CaseRunner caseData={activeCase} onCaseEnd={handleCaseEnd} onHome={handleRestart} />
      )}
      {phase === 'results' && (
        <Results activeCase={activeCase} caseTiming={caseTiming} onRestart={handleRestart} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
