<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復健科專科口試模擬</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e0f;
    --bg-elev: #16181a;
    --bg-card: #1c1f22;
    --border: #2a2e33;
    --border-strong: #3a3f45;
    --text: #e8e6e1;
    --text-dim: #9ca0a6;
    --text-faint: #5a5e64;
    --accent: #d4a548;
    --accent-dim: #8a6a2c;
    --warn: #e07a5f;
    --danger: #c8553d;
    --serif: 'Cormorant Garamond', 'Noto Serif TC', serif;
    --tc: 'Noto Serif TC', serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--tc);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.7;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 10%, rgba(212, 165, 72, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(212, 165, 72, 0.03) 0%, transparent 40%);
  }

  #root { min-height: 100vh; }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  .landing-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 48px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .landing-title {
    font-family: var(--serif);
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 12px;
  }
  .landing-title .tc {
    font-family: var(--tc);
    font-weight: 500;
    letter-spacing: 0;
  }
  .landing-sub {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 560px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .domain-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 56px;
  }
  .domain-cell {
    background: var(--bg);
    padding: 28px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    border: none;
    color: var(--text);
    font-family: var(--tc);
    position: relative;
  }
  .domain-cell:hover:not(:disabled) { background: var(--bg-elev); }
  .domain-cell.active { background: rgba(212, 165, 72, 0.08); }
  .domain-cell.active::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .domain-cell:disabled { opacity: 0.35; cursor: not-allowed; }
  .domain-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
  }
  .domain-name-en {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 4px;
  }
  .domain-name-tc {
    font-family: var(--tc);
    font-size: 18px;
    font-weight: 500;
  }
  .domain-cell.active .domain-name-tc { color: var(--accent); }
  .domain-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    margin-top: 12px;
  }

  .config-group { margin-bottom: 40px; }
  .config-label {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .count-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .count-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 18px 10px;
    font-family: var(--tc);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .count-btn:hover:not(:disabled) {
    border-color: var(--border-strong);
    background: var(--bg-elev);
  }
  .count-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(212, 165, 72, 0.06);
  }
  .count-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .count-btn-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .count-btn.active .count-btn-label {
    color: var(--accent);
  }
  .count-btn-num {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
  }

  /* Case picker (replaces count selector) */
  .case-pick-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }
  .case-pick-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: grid;
    grid-template-columns: 110px 1fr auto auto;
    gap: 20px;
    align-items: center;
    text-align: left;
    font-family: var(--tc);
  }
  .case-pick-btn:hover {
    border-color: var(--accent);
    background: var(--bg-elev);
    transform: translateX(2px);
  }
  .case-pick-btn:hover .case-pick-arrow {
    color: var(--accent);
    transform: translateX(4px);
  }
  .case-pick-num {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
  }
  .case-pick-title {
    font-family: var(--tc);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .case-pick-meta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .case-pick-arrow {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--text-faint);
    transition: all 0.15s ease;
  }
  @media (max-width: 700px) {
    .case-pick-btn {
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px 18px;
    }
    .case-pick-num {
      grid-column: 1;
      grid-row: 1;
    }
    .case-pick-title {
      grid-column: 1;
      grid-row: 2;
      font-size: 15px;
    }
    .case-pick-meta {
      grid-column: 1;
      grid-row: 3;
    }
    .case-pick-arrow {
      grid-column: 2;
      grid-row: 1 / span 3;
      align-self: center;
    }
    .q-top {
      grid-template-columns: auto auto;
      grid-template-rows: auto auto;
      gap: 10px 16px;
    }
    .q-top .home-link {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
    }
    .q-top .timer {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      font-size: 32px;
    }
    .q-top .timer.danger { font-size: 44px; }
    .q-marker {
      grid-column: 1 / span 2;
      grid-row: 2;
      text-align: center;
    }
    .case-header {
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      gap: 14px 16px;
    }
    .case-header .home-link {
      grid-column: 1;
      grid-row: 1;
    }
    .case-progress {
      grid-column: 2;
      grid-row: 1;
      font-size: 11px;
    }
    .case-title {
      grid-column: 1 / span 2;
      grid-row: 2;
      font-size: 26px;
      text-align: left;
    }
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .info-cell {
    background: var(--bg);
    padding: 18px 22px;
  }
  .info-cell-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-cell-value {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--text);
  }

  .start-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 22px;
    font-family: var(--tc);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .start-btn:hover:not(:disabled) {
    background: #e0b25a;
    transform: translateY(-1px);
  }
  .start-btn:disabled {
    background: var(--border);
    color: var(--text-faint);
    cursor: not-allowed;
    transform: none;
  }

  .case-screen {
    min-height: 100vh;
    padding: 48px 32px;
    max-width: 880px;
    margin: 0 auto;
  }
  .case-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 36px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: baseline;
    gap: 20px;
  }
  .case-title {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 500;
    text-align: center;
  }
  .case-progress {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: right;
    justify-self: end;
  }
  .case-body {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 36px 40px;
    margin-bottom: 32px;
    line-height: 1.85;
    font-size: 15.5px;
    white-space: pre-wrap;
  }
  .ready-note {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    text-align: center;
    margin: 24px 0;
  }

  /* Home link button (used in case header, q-top, results) */
  .home-link {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .home-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateX(-2px);
  }
  .results-home {
    margin-bottom: 18px;
  }

  .question-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 32px;
    max-width: 920px;
    margin: 0 auto;
  }
  .q-top {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .q-marker {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-faint);
    text-transform: uppercase;
    text-align: center;
  }
  .q-marker .accent { color: var(--accent); }
  .timer {
    font-family: var(--mono);
    font-size: 44px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: font-size 0.3s ease, color 0.3s ease;
  }
  .timer.warning { color: var(--warn); }
  .timer.danger {
    color: var(--danger);
    font-size: 64px;
    font-weight: 700;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
  }
  .progress-fill.warning { background: var(--warn); }
  .progress-fill.danger { background: var(--danger); }

  .subq-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 36px;
    justify-content: center;
  }
  .subq-dot {
    width: 28px;
    height: 4px;
    background: var(--border);
    transition: background 0.2s ease;
  }
  .subq-dot.done { background: var(--accent-dim); }
  .subq-dot.current { background: var(--accent); }

  .q-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 0;
    min-height: 320px;
  }
  .q-text {
    font-family: var(--tc);
    font-size: 26px;
    line-height: 1.55;
    font-weight: 400;
    text-align: left;
    max-width: 760px;
    color: var(--text);
  }

  .q-controls {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .q-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.15em;
  }
  .q-btns {
    display: flex;
    gap: 10px;
  }
  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }
  .ctrl-btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }
  .ctrl-btn.primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .timeup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 14, 15, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(8px);
    padding: 32px;
  }
  .timeup-mark {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--danger);
    margin-bottom: 16px;
  }
  .timeup-title {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .timeup-sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 40px;
  }

  .results-screen {
    padding: 48px 32px;
    max-width: 920px;
    margin: 0 auto;
  }
  .results-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 48px;
  }
  .results-title {
    font-family: var(--serif);
    font-size: 44px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .results-sub {
    color: var(--text-dim);
    font-size: 15px;
  }

  .case-block { margin-bottom: 64px; }
  .case-block-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .case-block-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.2em;
  }
  .case-block-title {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    flex: 1;
  }
  .case-domain-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 4px 10px;
  }
  .case-context {
    background: var(--bg-card);
    border-left: 2px solid var(--accent-dim);
    padding: 22px 28px;
    margin-bottom: 28px;
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text-dim);
    white-space: pre-wrap;
  }

  .qa-block {
    margin-bottom: 24px;
    padding-bottom: 0;
    border-bottom: none;
  }
  .qa-block:last-child { border-bottom: none; }

  /* Collapsible question block */
  .qa-card {
    border: 1px solid var(--border);
    background: var(--bg-card);
    transition: border-color 0.15s ease;
  }
  .qa-card.open {
    border-color: var(--border-strong);
  }
  .qa-summary {
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
    transition: background 0.15s ease;
  }
  .qa-summary:hover {
    background: var(--bg-elev);
  }
  .qa-chevron {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .qa-card.open .qa-chevron {
    transform: rotate(90deg);
    color: var(--accent);
  }
  .qa-q-summary {
    font-family: var(--tc);
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
  }
  .qa-q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    flex-shrink: 0;
  }
  .qa-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    white-space: nowrap;
    border: 1px solid var(--border);
    padding: 4px 10px;
    flex-shrink: 0;
  }
  .qa-time.timeout { color: var(--danger); border-color: var(--danger); }
  .qa-time.unanswered { color: var(--text-faint); opacity: 0.5; }

  .qa-expanded {
    border-top: 1px solid var(--border);
    padding: 4px 0;
  }

  /* Section: keywords */
  .det-section {
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
  }
  .det-section:last-child { border-bottom: none; }
  .det-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .det-section-label::before {
    content: '◆';
    font-size: 8px;
  }

  .keyword-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .keyword-tag {
    background: rgba(212, 165, 72, 0.08);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    padding: 5px 11px;
    font-family: var(--tc);
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .keyword-tag.en {
    font-family: var(--mono);
    font-size: 12px;
  }

  .points-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .points-list li {
    padding: 6px 0 6px 22px;
    position: relative;
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--text);
  }
  .points-list li::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 14px;
    width: 6px;
    height: 1px;
    background: var(--accent);
  }
  .points-list li strong {
    color: var(--accent);
    font-weight: 500;
  }

  .det-content {
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text);
  }
  .det-content strong {
    color: var(--accent);
    font-weight: 500;
  }
  .det-content ul, .det-content ol {
    margin: 8px 0 12px 20px;
  }
  .det-content li {
    margin-bottom: 6px;
  }
  .det-content p { margin-bottom: 12px; }
  .det-content p:last-child { margin-bottom: 0; }
  .det-content code {
    background: var(--bg);
    padding: 2px 6px;
    font-family: var(--mono);
    font-size: 13px;
    border: 1px solid var(--border);
  }
  .det-content table {
    border-collapse: collapse;
    margin: 12px 0;

<p><strong>2. 中風本身因素：</strong></p>
<ul>

    <li>NIHSS 5-15：中度</li>

</li>
<li>出血量（hemorrhagic）：&gt;30 mL 預後差，&gt;60 mL 死亡率極高</li>
<li>病灶位置：

</li>
<li>IVH（intraventricular hemorrhage）：預後不佳因子</li>

<li>初始 GCS：低 GCS 預後差</li>

<ul>

<p><strong>1. 第一線藥物</strong></p>

<table>
<tr><th>藥物</th><th>劑量</th><th>機轉</th><th>備註</th></tr>
<tr><td><strong>Amitriptyline</strong></td><td>10-25 mg qhs → 75-150 mg</td><td>Tricyclic：NE/5-HT reuptake + sodium channel</td><td>實證最強；anticholinergic 副作用、QT prolongation；老人慎用</td></tr>
<tr><td><strong>Nortriptyline</strong></td><td>10-25 mg qhs → 75-100 mg</td><td>Tricyclic（較少 anticholinergic）</td><td>替代 amitriptyline</td></tr>
<tr><td><strong>Gabapentin</strong></td><td>100 mg tid → 1200 mg tid</td><td>α2δ subunit</td><td>耐受性好；renal-adjusted</td></tr>
<tr><td><strong>Pregabalin</strong></td><td>50 mg bid → 150 mg bid</td><td>α2δ subunit</td><td>較 gabapentin 快起效</td></tr>
<tr><td><strong>Duloxetine</strong></td><td>30 mg/day → 60-120 mg/day</td><td>SNRI</td><td>合併 depression 時佳</td></tr>
<tr><td><strong>Lamotrigine</strong></td><td>25 mg/day → 200 mg/day（slow titrate 8 週）</td><td>Sodium channel</td><td>對 CPSP 有特殊實證；Stevens-Johnson 風險</td></tr>
</table>

<p><strong>選擇順序（CPSP）：</strong></p>
<ol>
<li>Amitriptyline（最強實證）— 若無禁忌</li>
<li>Gabapentin / Pregabalin（耐受性好）</li>
<li>Duloxetine（合併 depression）</li>
<li>Lamotrigine（特別對 CPSP 有實證）</li>
<li>Combination：amitriptyline + gabapentin</li>
</ol>

<p><strong>2. Topical</strong></p>
<ul>
<li><strong>Lidocaine 5% patch</strong>：每天 12 hr 貼，適合局部 allodynia；安全</li>
<li><strong>Capsaicin 8% patch</strong>：對 peripheral 較有效，CPSP 限</li>
<li><strong>Topical amitriptyline / ketamine</strong>：compounded</li>
</ul>

<p><strong>3. 介入治療（refractory）</strong></p>
<ul>
<li><strong>rTMS</strong>：刺激 motor cortex，對 CPSP 部分有效；非侵入性；FDA cleared for depression</li>
<li><strong>Motor cortex stimulation (MCS)</strong>：surgical，refractory case；對 CPSP 有實證</li>
<li><strong>Deep brain stimulation</strong>：最 refractory case</li>
<li><strong>Trigeminal nerve block</strong>：面部 CPSP 可考慮</li>
</ul>

<p><strong>4. 非藥物治療</strong></p>
<ul>
<li>TENS</li>
<li>CBT：管理 pain perception、coping</li>
<li>Mindfulness-based stress reduction</li>
<li>Pain neuroscience education</li>
<li>Acupuncture（實證 mixed）</li>
<li>Physical therapy：保持 ROM、活動</li>
</ul>

<p><strong>5. 環境與生活調整</strong></p>
<ul>
<li><strong>避免冷風</strong>：戴口罩、圍巾、保暖（最重要）</li>
<li><strong>洗臉</strong>：用溫水、不用過冷過熱</li>
<li><strong>溫和清潔</strong>：軟毛巾</li>
<li><strong>室內溫度</strong>：穩定、避免冷氣直吹</li>
<li><strong>壓力管理</strong>：emotional stress 加重</li>
<li><strong>睡眠衛生</strong>：疲勞加重</li>
</ul>

<h4>本病人治療計畫</h4>

<p><strong>第一個月：</strong></p>
<ol>
<li>確認診斷（IASP criteria 符合）</li>
<li>起始 amitriptyline 10 mg qhs → 25 mg qhs（替代：nortriptyline 或 gabapentin 100-300 mg tid）</li>
<li>Lidocaine 5% patch 局部試用</li>
<li>環境調整：保暖、口罩、軟毛巾</li>
<li>QoL 評估、焦慮憂鬱篩查</li>
</ol>

<p><strong>第 2-3 個月（若效果不足）：</strong>titrate amitriptyline 至 50-75 mg；或加 gabapentin 300 mg tid；combination therapy。</p>

<p><strong>第 4-6 個月（refractory）：</strong>switch to lamotrigine（slow titrate）；trial duloxetine；考慮 rTMS；CBT 介入；疼痛科會診。</p>

<p><strong>長期：</strong>多模式 maintenance；每 3-6 個月 reassess；能 taper 就 taper；支持團體。</p>

      },

const SECONDS_PER_CASE = 540;

const fmtTime = (s) => {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
};

const shuffle = (arr) => {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
};

function CaseRunner({ caseData, onCaseEnd, onHome }) {
  const [remaining, setRemaining] = useState(SECONDS_PER_CASE);
  const [qIdx, setQIdx] = useState(0);
  const [timeUp, setTimeUp] = useState(false);
  const [showEndConfirm, setShowEndConfirm] = useState(false);
  const [showContext, setShowContext] = useState(false);
  const [showHomeConfirm, setShowHomeConfirm] = useState(false);
  // qTimings[i] = { seconds: 累計秒數, timeout: bool, visited: bool }
  const [qTimings, setQTimings] = useState({});
  const totalQ = caseData.questions.length;
  const onCaseEndRef = useRef(onCaseEnd);
  onCaseEndRef.current = onCaseEnd;

  // 紀錄當前小題「這次進入」的開始時刻（以 case 開始後經過的秒數計）
  const qStartElapsedRef = useRef(0);
  // 用 ref 持有最新 qIdx 和 qTimings，避免 timer 拿到 stale closure
  const qIdxRef = useRef(qIdx);
  const qTimingsRef = useRef(qTimings);
  qIdxRef.current = qIdx;
  qTimingsRef.current = qTimings;

  useEffect(() => {
    setRemaining(SECONDS_PER_CASE);
    setQIdx(0);
    setTimeUp(false);
    setQTimings({});
    qStartElapsedRef.current = 0;
  }, [caseData.id]);

  useEffect(() => {
    if (timeUp) return;
    const timer = setInterval(() => {
      setRemaining(prev => {
        if (prev <= 1) {
          clearInterval(timer);
          // 計時器到 → 結算當前小題剩餘的這段時間，累計上去
          const elapsed = SECONDS_PER_CASE;
          const spentThisVisit = elapsed - qStartElapsedRef.current;
          const currentQ = qIdxRef.current;
          const prevTiming = qTimingsRef.current[currentQ];
          const accumulated = (prevTiming?.seconds || 0) + spentThisVisit;
          setQTimings(t => ({
            ...t,
            [currentQ]: { seconds: accumulated, timeout: true, visited: true }
          }));
          setTimeUp(true);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [caseData.id, timeUp]);

  // 將「這次停留在當前小題的時間」累加進去，並把 qStart 移到現在
  const accumulateCurrentQTime = () => {
    const elapsed = SECONDS_PER_CASE - remaining;
    const spentThisVisit = elapsed - qStartElapsedRef.current;
    if (spentThisVisit > 0) {
      setQTimings(t => {
        const prev = t[qIdx];
        return {
          ...t,
          [qIdx]: {
            seconds: (prev?.seconds || 0) + spentThisVisit,
            timeout: false,
            visited: true,
          }
        };
      });
    } else {
      // 即使停留 0 秒，也標記為 visited（代表使用者有經過這題）
      setQTimings(t => ({
        ...t,
        [qIdx]: { seconds: t[qIdx]?.seconds || 0, timeout: false, visited: true }
      }));
    }
    qStartElapsedRef.current = elapsed;
  };

  const handleNextQ = () => {
    if (qIdx + 1 < totalQ) {
      accumulateCurrentQTime();
      setQIdx(qIdx + 1);
    } else {
      setShowEndConfirm(true);
    }
  };

  const handlePrevQ = () => {
    if (qIdx > 0) {
      accumulateCurrentQTime();
      setQIdx(qIdx - 1);
    }
  };

  const handleConfirmEnd = () => {
    accumulateCurrentQTime();
    setShowEndConfirm(false);
    // 用 setTimeout 確保 state 更新後再傳出去
    setTimeout(() => {
      onCaseEndRef.current(qTimingsRef.current, qIdxRef.current);
    }, 0);
  };

  const handleTimeUpEnd = () => {
    onCaseEndRef.current(qTimingsRef.current, qIdxRef.current);
  };

  // 鍵盤快捷鍵
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'KeyH' || (e.code === 'Space' && !showEndConfirm && !timeUp)) {
        e.preventDefault();
        setShowContext(prev => !prev);
      } else if (e.code === 'Escape') {
        setShowContext(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showEndConfirm, timeUp]);

  const pct = (remaining / SECONDS_PER_CASE) * 100;
  const cls = remaining <= 60 ? 'danger' : '';
  const domain = DOMAINS.find(d => d.id === caseData.domain);

  return (
    <div className="question-screen">
      <div className="q-top">
        <button className="home-link" onClick={() => setShowHomeConfirm(true)}>
          ← 回首頁
        </button>
        <div className="q-marker">
          {domain && <span className="accent">{domain.tc}</span>}
          {' · QUESTION '}{qIdx + 1}/{totalQ}
        </div>
        <div className={`timer ${cls}`}>{fmtTime(remaining)}</div>
      </div>

      <div className="progress-bar">
        <div className={`progress-fill ${cls}`} style={{width: `${pct}%`}}></div>
      </div>

      <div className="subq-dots">
        {Array.from({length: totalQ}).map((_, i) => (
          <div key={i} className={`subq-dot ${i < qIdx ? 'done' : i === qIdx ? 'current' : ''}`}></div>
        ))}
      </div>

      <div className="q-body">
        <div className="q-text">{caseData.questions[qIdx].q}</div>
      </div>

      <div className="q-controls">
        <button className="ctrl-btn" onClick={() => setShowContext(true)}>
          📋 查看題幹
        </button>
        <div className="q-btns">
          {qIdx > 0 && (
            <button className="ctrl-btn" onClick={handlePrevQ}>← 上一題</button>
          )}
          <button className="ctrl-btn primary" onClick={handleNextQ}>
            {qIdx + 1 < totalQ ? '下一題 →' : '完成此大題 ✓'}
          </button>
        </div>
      </div>

      {showContext && (
        <div className="ctx-modal-bg" onClick={() => setShowContext(false)}>
          <div className="ctx-modal" onClick={(e) => e.stopPropagation()}>
            <div className="ctx-modal-header">
              <div className="ctx-modal-title">CASE CONTEXT — 題幹</div>
              <button className="ctx-modal-close" onClick={() => setShowContext(false)}>
                關閉 ESC
              </button>
            </div>
            <div className="ctx-modal-body">{caseData.context}</div>
            <div className="ctx-modal-footer">
              快捷鍵 <kbd>H</kbd> 或 <kbd>SPACE</kbd> 開關 · 計時器持續進行
            </div>
          </div>
        </div>
      )}

      {timeUp && (
        <div className="timeup-overlay">
          <div className="timeup-mark">TIME UP</div>
          <div className="timeup-title">時間到</div>
          <div className="timeup-sub">本大題作答時間結束</div>
          <button className="start-btn" style={{maxWidth:280}} onClick={handleTimeUpEnd}>
            查看完整詳解 →
          </button>
        </div>
      )}

      {showEndConfirm && (
        <div className="modal-bg">
          <div className="modal">
            <div className="modal-title">結束此大題？</div>
            <div className="modal-text">你已回答完所有小題。確認結束後將進入下一階段，剩餘時間將不被使用。</div>
            <div className="modal-btns">
              <button className="modal-btn" onClick={() => setShowEndConfirm(false)}>繼續使用時間</button>
              <button className="modal-btn primary" onClick={handleConfirmEnd}>
                結束本大題
              </button>
            </div>
          </div>
        </div>
      )}

      {showHomeConfirm && (
        <div className="modal-bg">
          <div className="modal">
            <div className="modal-title">回到首頁？</div>
            <div className="modal-text">目前作答進度與計時將不會保留。確認離開？</div>
            <div className="modal-btns">
              <button className="modal-btn" onClick={() => setShowHomeConfirm(false)}>繼續作答</button>
              <button className="modal-btn primary" onClick={onHome}>
                離開回首頁
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function QABlockWrapper({ qa, qi, timing, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);

  let timeBadge;
  if (timing && timing.visited) {
    timeBadge = (
      <div className={`qa-time ${timing.timeout ? 'timeout' : ''}`}>
        {timing.timeout && '⏱ '}{fmtTime(timing.seconds)}{timing.timeout && ' · 時間到'}
      </div>
    );
  } else {
    timeBadge = <div className="qa-time unanswered">未作答</div>;
  }

  return (
    <div className="qa-block">
      <div className={`qa-card ${open ? 'open' : ''}`}>
        <div className="qa-summary" onClick={() => setOpen(!open)}>
          <span className="qa-chevron">▶</span>
          <span className="qa-q-num">Q{String(qi+1).padStart(2,'0')}</span>
          <span className="qa-q-summary">{qa.q}</span>
          {timeBadge}
        </div>
        {open && (
          <div className="qa-expanded">
            {(qa.keywords && qa.keywords.length > 0) && (
              <div className="det-section">
                <div className="det-section-label">關鍵字 KEYWORDS</div>
                <div className="keyword-list">
                  {qa.keywords.map((k, i) => (
                    <span key={i} className={`keyword-tag ${/^[A-Za-z0-9\s\-\/&,\.\(\)]+$/.test(k) ? 'en' : ''}`}>{k}</span>
                  ))}
                </div>
              </div>
            )}
            {(qa.points && qa.points.length > 0) && (
              <div className="det-section">
                <div className="det-section-label">應提到的要點 KEY POINTS</div>
                <ul className="points-list">
                  {qa.points.map((p, i) => (
                    <li key={i} dangerouslySetInnerHTML={{__html: p}}></li>
                  ))}
                </ul>
              </div>
            )}
            {qa.a && (
              <div className="det-section">
                <div className="det-section-label">完整詳解 DETAIL</div>
                <div className="det-content" dangerouslySetInnerHTML={{__html: qa.a}}></div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState('landing');
  const [activeCase, setActiveCase] = useState(null);
  // caseTiming = { timings: {qIdx: {seconds, timeout}}, lastQIdx }
  const [caseTiming, setCaseTiming] = useState({ timings: {}, lastQIdx: -1 });

  const handleStart = (caseObj) => {
    setActiveCase(caseObj);
    setCaseTiming({ timings: {}, lastQIdx: -1 });
    setPhase('intro');
  };

  const handleReady = () => setPhase('running');

  const handleCaseEnd = (timings, lastQIdx) => {
    setCaseTiming({ timings: timings || {}, lastQIdx: lastQIdx ?? -1 });
    setPhase('results');
  };

  const handleRestart = () => {
    setPhase('landing');
    setActiveCase(null);
    setCaseTiming({ timings: {}, lastQIdx: -1 });
  };

  return (
    <>
      {phase === 'landing' && <Landing onStart={handleStart} />}
      {phase === 'intro' && (
        <CaseIntro caseData={activeCase} onReady={handleReady} onHome={handleRestart} />
      )}
      {phase === 'running' && (
        <CaseRunner caseData={activeCase} onCaseEnd={handleCaseEnd} onHome={handleRestart} />
      )}
      {phase === 'results' && (
        <Results activeCase={activeCase} caseTiming={caseTiming} onRestart={handleRestart} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
